[build]
builder = "RAILPACK"
buildCommand = "npm install --include=dev && npm run build:packages && npm run build --workspace=@antiai/api && npm run build --workspace=@antiai/web"

[deploy]
# This command runs after the build is complete but before the new deployment starts taking traffic.
# The UI timeline refers to this as "Post-deploy", but the settings panel calls it "Pre-deploy".
preDeployCommand = "npm run push -w packages/database -- --accept-data-loss"
