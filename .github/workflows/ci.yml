name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: antiai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: |
          cd packages/database
          cat << 'EOF' > .env
          DATABASE_URL="postgresql://postgres:password@localhost:5432/antiai"
          EOF
          npx prisma migrate deploy
          npx prisma generate
          cd ../..
          npm run build:packages

      - name: Verify Config
        run: |
          cd apps/api
          cat << 'EOF' > .env
          DATABASE_URL="postgresql://postgres:password@localhost:5432/antiai"
          EOF
          node fix_db_config_v2.js

      - name: Run all tests
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/antiai"
          REDIS_URL: "redis://localhost:6379"
          JWT_SECRET: "ci-test-secret"
        run: npm run test

      - name: Install Playwright Browsers
        run: |
          cd apps/web
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/antiai"
        run: |
          cd apps/web
          npx playwright test
