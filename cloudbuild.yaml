steps:
  # Step 1: Build the Docker image for the API
  # Build context is the monorepo root (.) so the Dockerfile can access packages/
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build'
    args:
      - 'build'
      - '-t'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/antiai/api:$COMMIT_SHA'
      - '-t'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/antiai/api:latest'
      - '-f'
      - 'apps/api/Dockerfile'
      - '.'
    timeout: '1200s'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push'
    args:
      - 'push'
      - '--all-tags'
      - 'us-south1-docker.pkg.dev/$PROJECT_ID/antiai/api'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'antiai'
      - '--image=us-south1-docker.pkg.dev/$PROJECT_ID/antiai/api:$COMMIT_SHA'
      - '--region=us-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=4000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--set-env-vars=NODE_ENV=production'

images:
  - 'us-south1-docker.pkg.dev/$PROJECT_ID/antiai/api:$COMMIT_SHA'
  - 'us-south1-docker.pkg.dev/$PROJECT_ID/antiai/api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
